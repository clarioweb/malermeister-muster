<!DOCTYPE html>
<html>
<head>

<body>
<script>window.CMS_MANUAL_INIT = true;</script>
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
<script>
CMS.init({config:{backend:{name:'git-gateway',branch:'main'},media_folder:'images/uploads',public_folder:'/images/uploads',locale:'de',collections:[{name:'settings',label:'Website-Einstellungen',files:[{name:'site',label:'Startseite & Inhalte',file:'content/site.json',format:'json',fields:[{label:'Hero-Überschrift',name:'hero_title',widget:'string'},{label:'Hero-Unterzeile',name:'hero_sub',widget:'text'},{label:'Telefonnummer',name:'phone',widget:'string'},{label:'E-Mail',name:'email',widget:'string'},{label:'Jahre Erfahrung',name:'years',widget:'string'},{label:'Leistungen',name:'services',widget:'list',summary:'{{fields.name}}',fields:[{label:'Name',name:'name',widget:'string'},{label:'Kategorie',name:'tag',widget:'select',options:['Innen','Außen','Boden','Sanierung','Spezial']},{label:'Beschreibung',name:'desc',widget:'text'},{label:'Aufzählungspunkte',name:'bullets',widget:'list',field:{label:'Punkt',name:'item',widget:'string'}}]},{label:'Kundenstimmen',name:'testimonials',widget:'list',summary:'{{fields.name}}',fields:[{label:'Name',name:'name',widget:'string'},{label:'Ort/Rolle',name:'role',widget:'string'},{label:'Zitat',name:'quote',widget:'text'},{label:'Initialen',name:'initials',widget:'string'}]},{label:'Galerie',name:'gallery',widget:'list',summary:'{{fields.label}}',fields:[{label:'Beschriftung',name:'label',widget:'string'},{label:'Vorher-Bild',name:'before',widget:'image'},{label:'Nachher-Bild',name:'after',widget:'image'}]},{label:'SEO Stadtteile',name:'districts',widget:'list',summary:'{{fields.district}}',fields:[{label:'Stadtteil',name:'district',widget:'string'},{label:'SEO-Titel',name:'seo_title',widget:'string'},{label:'SEO-Beschreibung',name:'seo_desc',widget:'text'},{label:'Haupttext',name:'body',widget:'markdown'},{label:'Kundenzitat',name:'quote',widget:'text'},{label:'Zitatgeber',name:'quote_author',widget:'string'}]}]}]}]}});
</script>
</body>
</html>
